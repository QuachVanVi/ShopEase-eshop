version: '3.8'
services:
  db:
    image: postgres:15
    container_name: shopease_db
    environment:
      POSTGRES_DB: shopease_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
